<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Executive Mode</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

.nav{
    display:flex;
    justify-content:space-around;
    background:#111;
    padding: 15px 0px;
}

.nav .active{color: #0becb2}

.nav div{
    cursor:pointer;
    border-right:1px solid #666666;
    padding: 0px 8px;
}
.nav div:last-child{
    border-right:none;
}

.tab{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

.section{
    background:#111;
    padding:16px 8px;
    margin-bottom:16px;
    border-radius:8px;
    border-bottom:1px solid #303030;
}
.section > h3{
    margin-bottom:10px;
    margin-top:0px;
}

.section > b{
    margin-bottom: 10px;
    display: flex;
    font-size: 14px;
}
}
    
.BoxGrid{
    padding: 10px 0;
}
.BoxGrid .section{
    padding: 0;
}
input[type="checkbox"]{
    border: 1px solid #ccc;
    width: 20px;
    height: 20px;
    cursor: pointer;

}
    .sec-div > label{background:none;}
    .sec-div > input{
        width:100%;
        padding: 10px;
        margin-bottom:10px;
    }

/* FIX ALIGNMENT */
label{
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    width: calc(100% - 16px);
    padding: 8px;
    background: #000;
    margin-bottom: 9px;
    border-radius: 8px;
}

label span{
    text-align:left;
}

canvas{
    display:block;
    margin:auto;
}
.SaveBtn{
    background: #0becb2;
    width: 100%;
    padding: 10px;
    font-weight: bold;
    border: 0;
    border-radius: 8px;
    text-transform: uppercase;
    max-width: 375px;
    cursor: pointer;
}
.SelectBox{
    width: 100%;
    padding: 10px;
    font-weight: bold;
    max-width:375px;
}
    .inputBox{
    padding: 10px;
    width: calc(100% - 20px);
    margin-top: 8px;
    font-weight: bold;
    }
</style>

</head>

<body>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="tab active">

<div class="section">
<h3>Today Score</h3>
<canvas id="scoreRing" width="160" height="160"></canvas>
<div id="todayPercent" style="text-align:center;">0%</div>
</div>

<div class="section">
<h3>Recovery Index</h3>
<div id="performanceIndex">Not logged</div>
</div>

<div class="section">
<h3>Latest Measurement</h3>
<div id="latestMeasurement">No data</div>
</div>

</div>

<!-- ================= WORKOUT ================= -->
<div id="workout" class="tab">

<div class="section">
<h3 id="dayTitle">Day 1</h3>
</div>

<div class="section">
<h3>Pre Workout</h3>
<div id="preStretch" class="BoxGrid"></div>
</div>

<div class="section">
<h3>Main Workout</h3>
<div id="exerciseList" class="BoxGrid"></div>
</div>

<div class="section">
<h3>Post Workout</h3>
<div id="postStretch" class="BoxGrid"></div>
</div>

<div class="section">
<h3>Reading</h3>
<div id="readingSection" class="BoxGrid"></div>
</div>

<div class="section">
<h3>Alcohol (Pegs)</h3>
<input type="number" id="alcoholInput" min="0" value="0" class="inputBox">
</div>

</div>

<!-- ================= MEASUREMENTS ================= -->
<div id="measurements" class="tab">

<div class="section">
<h3>Measurements</h3>

<div class="sec-div">  
    <label>Weight:</label> 
    <input id="m_weight">
</div>
<div class="sec-div">  
    <label>Waist:</label>
    <input id="m_waist">
</div>
<div class="sec-div">  
    <label>Chest:</label>
    <input id="m_chest">
</div>
<div class="sec-div">  
    <label>Arms:</label>
    <input id="m_arms">
</div>
<div class="sec-div">  
    <label>Thighs:</label>
    <input id="m_thighs"><br><br>
</div>
<div class="sec-div">  
    <label>Shoulders:</label> <input id="m_shoulders">
</div>
<div class="sec-div">  
    <label>Body Fat:</label> <input id="m_bodyfat">
</div>

<button onclick="saveMeasurement()" class="SaveBtn">Save</button>
</div>

<div class="section">
<h3>Ideal Comparison</h3>
<div id="measurementComparison"></div>
</div>

</div>

<!-- ================= RECOVERY ================= -->
<div id="recovery" class="tab">

<div class="section">
<h3 style="margin-bottom:10px;">Morning Recovery</h3>

<label><input type="checkbox" id="rec_sleep"> <span>Slept ≥ 6.5h</span></label>
<label><input type="checkbox" id="rec_alarm"> <span>Woke before alarm</span></label>
<label><input type="checkbox" id="rec_joint"> <span>No joint stiffness</span></label>
<label><input type="checkbox" id="rec_sharp"> <span>Mentally sharp</span></label>
<label><input type="checkbox" id="rec_vital"> <span>Morning vitality</span></label>

<br>

<select id="rec_cns" class="SelectBox">
<option value="1">1 – Low</option>
<option value="2">2 – Below Avg</option>
<option value="3">3 – Normal</option>
<option value="4">4 – Good</option>
<option value="5">5 – Peak</option>
</select>
<br><br>

<button onclick="saveRecovery()" class="SaveBtn">Save Recovery</button>
    
</div>

</div>

<script src="app.js"></script>

</body>
