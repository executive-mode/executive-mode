<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Mode</title>

<style>

body{
background:#000;
color:#fff;
font-family:Arial, sans-serif;
margin:0;
font-size:16px;
}

header{
text-align:center;
padding:18px;
font-size:22px;
background:#111;
}

nav{
display:flex;
justify-content:space-around;
background:#222;
padding:12px 5px;
position:sticky;
top:0;
}

nav button{
background:none;
border:none;
color:#aaa;
font-size:16px;
padding:10px 8px;
cursor:pointer;
}

nav button:hover{
color:#fff;
}

.tab{
display:none;
padding:18px;
}

.active{
display:block;
}

.section{
margin-bottom:18px;
padding:14px;
background:#111;
border-radius:8px;
}

input,select{
background:#222;
color:#fff;
border:1px solid #333;
padding:8px;
font-size:15px;
width:100%;
box-sizing:border-box;
margin-top:6px;
}

button{
background:#333;
color:#fff;
border:none;
padding:10px 14px;
font-size:15px;
cursor:pointer;
margin-top:12px;
border-radius:6px;
}

.directive{
font-size:18px;
font-weight:bold;
padding:12px;
border-radius:8px;
margin-bottom:15px;
text-align:center;
}

.green{ background:#063; }
.gray{ background:#333; }
.red{ background:#500; }

canvas{
display:block;
margin:12px auto;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 600px){

body{
font-size:17px;
}

nav button{
font-size:17px;
padding:12px 6px;
}

header{
font-size:20px;
}

.directive{
font-size:19px;
}

}

</style>
</head>

<body>

<header>Executive Mode</header>

<nav>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('workout')">Workout</button>
<button onclick="showTab('measurements')">Measurements</button>
<button onclick="showTab('recovery')">Recovery</button>
</nav>

<!-- ================= DASHBOARD ================= -->

<section id="dashboard" class="tab active">

<div class="section">
<h3>Today Score</h3>
<canvas id="scoreRing" width="160" height="160"></canvas>
<div id="todayPercent"></div>
</div>

<div class="section">
<h3>Weekly Compliance</h3>
<div style="background:#222;height:8px;border-radius:4px;">
<div id="weeklyBar" style="height:8px;width:0%;border-radius:4px;"></div>
</div>
<div id="weeklyPercent"></div>
</div>

<div class="section">
<h3>Recovery Index</h3>
<div id="performanceIndex">Not logged today</div>
</div>

<div class="section">
<h3>Latest Measurement</h3>
<div id="latestMeasurement">No data</div>
</div>

<div class="section">
<h3>Last Strength Update</h3>
<div id="strengthUpdate"></div>
</div>

</section>

<!-- ================= WORKOUT ================= -->

<section id="workout" class="tab">

<div id="trainingDirective" class="directive gray">
Log Recovery First
</div>

<h3 id="dayTitle"></h3>

<div class="section">
<h4>Pre Workout</h4>
<div id="preStretch"></div>
</div>

<div class="section">
<h4>Main Workout</h4>
<div id="exerciseList"></div>
</div>

<div class="section">
<h4>Post Workout</h4>
<div id="postStretch"></div>
</div>

<div class="section">
<h4>Reading</h4>
<div id="readingSection"></div>
</div>

<div class="section">
<h4>Alcohol (Pegs)</h4>
<input type="number" id="alcoholInput" min="0" onchange="updateScore()">
</div>

</section>

<!-- ================= MEASUREMENTS ================= -->

<section id="measurements" class="tab">

<div class="section">
<h3>Measurements</h3>

<label>Weight (kg)</label>
<input type="number" id="m_weight">

<label>Waist (inches)</label>
<input type="number" id="m_waist">

<label>Chest (inches)</label>
<input type="number" id="m_chest">

<label>Arms (inches)</label>
<input type="number" id="m_arms">

<label>Thighs (inches)</label>
<input type="number" id="m_thighs">

<label>Shoulders (inches)</label>
<input type="number" id="m_shoulders">

<label>Body Fat (%)</label>
<input type="number" id="m_bodyfat">

<button onclick="saveMeasurement()">Save Measurement</button>

</div>

<div class="section">
<h4>Ideal Comparison</h4>
<div id="measurementComparison"></div>
</div>

</section>

<!-- ================= RECOVERY ================= -->

<section id="recovery" class="tab">

<div class="section">
<h3>Morning Recovery</h3>

<label><input type="checkbox" id="rec_sleep"> Slept ≥ 6.5 hours</label><br>
<label><input type="checkbox" id="rec_alarm"> Woke before alarm</label><br>
<label><input type="checkbox" id="rec_joint"> No joint stiffness</label><br>
<label><input type="checkbox" id="rec_sharp"> Mentally sharp within 10 min</label><br>
<label><input type="checkbox" id="rec_vital"> Morning vitality present</label><br><br>

<label>CNS Readiness</label>
<select id="rec_cns">
<option value="1">1 – Foggy</option>
<option value="2">2 – Heavy</option>
<option value="3">3 – Normal</option>
<option value="4">4 – Alert</option>
<option value="5">5 – Sharp</option>
</select>

<button onclick="saveRecovery()">Save Recovery</button>

</div>

<div class="section">
<h4>Reminders</h4>

<label>Workout</label>
<input type="time" id="r_workout">

<label>Supplement</label>
<input type="time" id="r_supplement">

<label>Sleep</label>
<input type="time" id="r_sleep">

<button onclick="saveReminders()">Save Reminders</button>

</div>

</section>

<script src="app.js"></script>

</body>
</html>
